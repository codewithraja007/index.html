<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Someone Special ❤️</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family: Arial, sans-serif;}
    body{
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      background-image: url("fineshyt.jpeg");
      background-position: center;
      color:#333;display:flex;justify-content:center;align-items:center;
      min-height:100vh;text-align:center;padding:20px;
    }
    .container{
      background:white;padding:30px;border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      max-width:420px;width:100%;animation: fadeIn 1.5s ease-in-out;
      position:relative;
    }
    h1{font-size:24px;margin-bottom:15px;}
    p{font-size:16px;margin-bottom:20px;}
    button{
      padding:10px 20px;border:none;border-radius:25px;
      background:#ff6b81;color:white;font-size:16px;cursor:pointer;
      transition:0.3s;margin:5px;
    }
    button:hover{background:#ff4757;}
    .hidden{display:none;margin-top:15px;font-size:18px;color:#ff4757;}
    .photo-box{margin:15px 0;}
    input[type="file"]{margin-bottom:10px;}
    img{width:100%;max-height:250px;object-fit:cover;border-radius:15px;display:none;}

    .choice-box{margin-top:20px; display:flex; flex-direction:column; align-items:center;}
    .btn-row{display:flex; gap:10px; justify-content:center; margin-top:10px;}
    #noBtn{position:absolute;}

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);} 
      to{opacity:1; transform:translateY(0);} 
    }
    @media(max-width:500px){h1{font-size:20px;} p{font-size:14px;}}
  </style>
</head>
<body>

<div class="container" id="box">
  <h1>Hey my acha fine ohk ❤️</h1>
  <p>I made something special just for you...</p>

  

  <button onclick="showMessage()">Click Me</button>

  <div id="message" class="hidden">
    I think I'm starting to like you... a lot 😊
  </div>

  <div class="choice-box">
    <p>Do you like me? 😏</p>
    <div class="btn-row">
      <button onclick="yesClicked()">Yes ❤️</button>
      <button id="noBtn" onmouseover="moveNo()">No 😜</button>
    </div>
  </div>
</div>

<script>
  function showMessage(){
    document.getElementById("message").style.display = "block";
    window.location.href="fir.html"
  }

  function loadPhoto(event){
    const img = document.getElementById('preview');
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = 'block';
  }

  function yesClicked(){
    alert("I knew it 😍❤️");
  }

  function moveNo(){
    const btn = document.getElementById("noBtn");
    const box = document.getElementById("box");

    const x = Math.random() * (box.clientWidth - btn.clientWidth);
    const y = Math.random() * (box.clientHeight - btn.clientHeight);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }
</script>

</body>
</html>
